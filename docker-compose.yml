services:
  app:
    image: iskycc/mdagent:latest
    container_name: miaodi-agent
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      PORT: 8735
      DB_HOST: 119.29.21.39
      DB_PORT: 3306
      DB_USER: mdagent
      DB_PASS: ${DB_PASS}
      DB_NAME: mdagent
      DB_MAX_OPEN: 50
      DB_MAX_IDLE: 10
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: https://api.deepseek.com/v1
      OPENAI_MODEL: deepseek-v4-flash
      OPENAI_MODEL_MAX_TOKENS: 100000
      OPENAI_MAX_OUTPUT_TOKENS: 64000
      APP_DEBUG: "false"
      OPENAI_DEBUG: "false"
      CALLBACK_PATH: /webhook
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      CALLBACK_AUTH_ENABLED: "false"
      STATS_TOKEN: ${STATS_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_ENABLED: "true"
      TZ: Asia/Shanghai
    ports:
      - "8735:8735"

  redis:
    image: redis:7-alpine
    container_name: miaodi-agent-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
